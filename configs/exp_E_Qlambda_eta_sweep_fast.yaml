# Eta sweep on a fixed, already-verified safe rectangle.
# Goal: see whether changing Cayley scale eta materially reduces the
# post-normalization (best-fit constant) shape error |Q/cN - 1|.

mp_dps: 50

bulk_mode: two_channel_symmetric
completion_mode: dual_1_minus_s

primes: [2, 3, 5, 7, 11, 13, 17, 19, 23]
Ns: [64, 96, 128]

boundary_frac: 0.25

# Baseline values (overridden by the sweep lists below)
eta: 1.0
schur_jitter: 1.0e-10
cayley_eps: 0.0

# Only run the sweep.
do_regularization_sweep_only: true
reg_sweep_resume: true

# Safe rectangle from dip atlas (Feb 11 run)
reg_sweep_rect: [0.55, 1.06, 3.3855, 3.6815]
reg_sweep_n_sigma: 21
reg_sweep_n_t: 21

# Sweep: eta only (keep jitter/eps fixed)
reg_sweep_jitters: [1.0e-10]
reg_sweep_cayley_eps: [0.0]
reg_sweep_etas: [0.1, 0.3, 1.0, 3.0, 10.0]

# Winding check sanity check (per-eta)
reg_sweep_do_winding: true
reg_sweep_wind_N: 96
reg_sweep_wind_basis: incoming
reg_sweep_wind_block: plus
reg_sweep_wind_n_edge: 800

print_progress: false
